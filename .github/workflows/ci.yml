name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: test-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: studyos-4d50d.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: studyos-4d50d
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: studyos-4d50d.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "934899860520"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:934899860520:web:1643f3e0fa47c6cc13211d"
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: G-RN2CVTC1S5
          NEXT_PUBLIC_FIREBASE_DATABASE_URL: https://studyos-4d50d-default-rtdb.firebaseio.com/
          NEXT_PUBLIC_FIREBASE_VAPID_KEY: test-vapid
          NEXT_PUBLIC_MIXPANEL_TOKEN: test-mixpanel
          SESSION_SECRET: test-session-secret
